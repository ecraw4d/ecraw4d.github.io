<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Lab</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .chart-container {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>D3.js Introduction Lab</h1>
    <div id="chart" class="chart-container"></div>
    
    <script>
        // Sample data: Population of US states (in millions, 2020 Census)
const data = [
    { state: "California", population: 39.5 },
    { state: "Texas", population: 29.1 },
    { state: "Florida", population: 21.5 },
    { state: "New York", population: 20.2 },
    { state: "Pennsylvania", population: 13.0 },
    { state: "Illinois", population: 12.8 }
];

const svg = d3.select("#chart")
    .append("svg")
    .attr("width", 600)
    .attr("height", 300);

// Create circles for each data point
svg.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
    .attr("cx", (d, i) => 50 + i * 90)
    .attr("cy", 150)
    .attr("r", d => d.population)
    .attr("fill", "steelblue")
    .attr("opacity", 0.7);
    </script>
</body>
</html>
