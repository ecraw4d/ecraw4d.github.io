<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Lab</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .chart-container {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>D3.js Introduction Lab</h1>
    <div id="chart" class="chart-container"></div>
    
    <script>
        // Sample data: Population of US states (in millions, 2020 Census)
        const data = [
            { state: "California", population: 39.5 },
            { state: "Texas", population: 29.1 },
            { state: "Florida", population: 21.5 },
            { state: "New York", population: 20.2 },
            { state: "Pennsylvania", population: 13.0 },
            { state: "Illinois", population: 12.8 }
        ];

        // Define the chart dimensions
        const width = 600;
        const height = 400;
        const margin = { top: 20, right: 30, bottom: 40, left: 100 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        // Create scales
        const xScale = d3.scaleLinear()
            .domain([0, d3.max(data, d => d.population)])
            .range([0, innerWidth]);

        const yScale = d3.scaleBand()
            .domain(data.map(d => d.state))
            .range([0, innerHeight])
            .padding(0.2);

        // Create the SVG container
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Create a group for the chart area
        const chartArea = svg.append("g")
            .attr("transform", `translate(${margin.left}, ${margin.top})`);

        // Create BARS (rects) instead of circles
        chartArea.selectAll("rect")
            .data(data)
            .join("rect")
            .attr("y", d => yScale(d.state))          // Position vertically by state
            .attr("height", yScale.bandwidth())       // Height based on the scale band
            .attr("width", d => xScale(d.population)) // Width based on population
            .attr("fill", "steelblue");
    </script>
</body>
</html>
