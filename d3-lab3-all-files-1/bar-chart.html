<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Bar Chart - State Populations</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        .bar { 
            fill: steelblue; 
        }
        .bar:hover { 
            fill: coral; 
        }
        .axis text { 
            font-size: 12px; 
        }
        .axis path, .axis line { 
            stroke: #ccc; 
        }
        .chart-title { 
            font-size: 18px; 
            font-weight: bold; 
        }
        .label {
            fill: #333;
        }
    </style>
</head>
<body>
    <h1>D3.js Introduction Lab - Bar Chart</h1>
    <p>This horizontal bar chart displays state populations using D3.js v7.</p>
    <div id="chart"></div>

    <script>
        // Data embedded directly in the file
        const data = [
            { state: "California", population: 39.5 },
            { state: "Texas", population: 29.1 },
            { state: "Florida", population: 21.5 },
            { state: "New York", population: 20.2 },
            { state: "Pennsylvania", population: 13.0 },
            { state: "Illinois", population: 12.8 }
        ];

        // Chart dimensions using margin convention
        const width = 600;
        const height = 400;
        const margin = { top: 40, right: 40, bottom: 40, left: 120 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        // Create SVG container
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Add chart title
        svg.append("text")
            .attr("class", "chart-title")
            .attr("x", width / 2)
            .attr("y", 25)
            .attr("text-anchor", "middle")
            .text("US State Populations (millions)");

        // Create chart area group, translated by margins
        const chart = svg.append("g")
            .attr("transform", `translate(${margin.left}, ${margin.top})`);

        // Create scales
        const xScale = d3.scaleLinear()
            .domain([0, d3.max(data, d => d.population)])
            .range([0, innerWidth])
            .nice();

        const yScale = d3.scaleBand()
            .domain(data.map(d => d.state))
            .range([0, innerHeight])
            .padding(0.2);

        // Create and add axes
        const xAxis = d3.axisBottom(xScale)
            .ticks(5)
            .tickFormat(d => d + "M");

        const yAxis = d3.axisLeft(yScale);

        chart.append("g")
            .attr("class", "axis x-axis")
            .attr("transform", `translate(0, ${innerHeight})`)
            .call(xAxis);

        chart.append("g")
            .attr("class", "axis y-axis")
            .call(yAxis);

        // Create bars
        chart.selectAll(".bar")
            .data(data)
            .join("rect")
            .attr("class", "bar")
            .attr("x", 0)
            .attr("y", d => yScale(d.state))
            .attr("width", d => xScale(d.population))
            .attr("height", yScale.bandwidth());

        // Add value labels at end of each bar
        chart.selectAll(".label")
            .data(data)
            .join("text")
            .attr("class", "label")
            .attr("x", d => xScale(d.population) + 5)
            .attr("y", d => yScale(d.state) + yScale.bandwidth() / 2)
            .attr("dy", "0.35em")
            .attr("font-size", "11px")
            .text(d => d.population + "M");
    </script>
</body>
</html>
